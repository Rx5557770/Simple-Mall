<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户认证{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ea580c',
                        primaryHover: '#c2410c',
                        bgSurface: '#fafaf9',
                        textMain: '#1c1917',
                        textSub: '#78716c',
                        border: '#e7e5e4',
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-bgSurface min-h-screen flex items-center justify-center p-4 font-sans text-textMain">

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
