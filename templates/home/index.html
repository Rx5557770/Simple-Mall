<!-- templates/index.html -->
{% extends 'home/base.html' %}

{% block title %}首页 - {{ home.web_title }}{% endblock %}

{% block content %}
    <section class="bg-gradient-to-b from-secondary to-white py-20 md:py-28 2xl:py-20">
        <div class="max-w-4xl 2xl:max-w-3xl mx-auto px-4 2xl:px-3 text-center">
            <h1 class="text-4xl md:text-6xl 2xl:text-5xl font-extrabold text-dark mb-6 2xl:mb-4 tracking-tight leading-tight">
                {{ home.web_title }}
            </h1>
            <p class="text-lg md:text-xl 2xl:text-lg text-slate-600 mb-10 2xl:mb-7 max-w-2xl 2xl:max-w-xl mx-auto leading-relaxed">
                {{ home.content }}
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4 2xl:gap-3">
                <a href="{% url 'home:items' %}" class="bg-primary text-white px-8 2xl:px-6 py-3.5 2xl:py-3 rounded-full font-bold hover:bg-teal-800 transition shadow-lg shadow-teal-700/30 transform hover:-translate-y-1">
                    浏览资源
                </a>
            </div>
        </div>
    </section>

    <section class="py-20 2xl:py-14 max-w-6xl 2xl:max-w-5xl mx-auto px-4 2xl:px-3">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 2xl:gap-5">
            {% for card in cards %}
            <div class="bg-white p-8 2xl:p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition duration-300 group">
                <div class="w-14 h-14 2xl:w-12 2xl:h-12 bg-teal-50 rounded-xl flex items-center justify-center text-primary mb-6 2xl:mb-4 group-hover:scale-110 transition duration-300">
                    <svg class="w-7 h-7 2xl:w-6 2xl:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h3 class="text-xl 2xl:text-lg font-bold text-dark mb-3 2xl:mb-2">{{ card.title }}</h3>
                <p class="text-slate-500 leading-relaxed 2xl:text-sm">{{ card.content }}</p>
            </div>
            {% endfor %}
        </div>
    </section>
{% endblock %}
